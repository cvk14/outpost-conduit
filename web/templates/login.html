<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Outpost Conduit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: #1a1d28;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    .login-card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.25rem;
      color: #e0e0e0;
    }

    .login-card .subtitle {
      text-align: center;
      color: #64748b;
      font-size: 0.875rem;
      margin-bottom: 1.75rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 0.375rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.625rem 0.75rem;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus {
      border-color: #2563eb;
    }

    .form-group input::placeholder {
      color: #64748b;
    }

    .btn-login {
      width: 100%;
      padding: 0.625rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-login:hover {
      background: #1d4ed8;
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 0.625rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8125rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .logo-icon {
      text-align: center;
      margin-bottom: 1rem;
      font-size: 2rem;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-icon">&#9678;</div>
    <h1>Outpost Conduit</h1>
    <p class="subtitle">Sign in to continue</p>

    <div id="error" class="error-msg"></div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="submitBtn">Sign In</button>
    </form>

    <div style="text-align:center;margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid #2a2d3a">
      <button class="btn-login" id="passkeyBtn" style="background:#1e293b;border:1px solid #2a2d3a">
        &#128272; Sign in with Passkey
      </button>
    </div>
  </div>

  <script>
    // If already authenticated, redirect to app
    if (localStorage.getItem('token')) {
      window.location.href = '/';
    }

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');

    // Password login
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const resp = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          throw new Error(data.detail || 'Invalid credentials');
        }

        const data = await resp.json();
        localStorage.setItem('token', data.token);
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });

    // Passkey login
    const passkeyBtn = document.getElementById('passkeyBtn');

    // Hide passkey button if WebAuthn not supported
    if (!window.PublicKeyCredential) {
      passkeyBtn.style.display = 'none';
    }

    passkeyBtn.addEventListener('click', async () => {
      errorEl.style.display = 'none';
      passkeyBtn.disabled = true;
      passkeyBtn.textContent = 'Waiting for passkey...';

      try {
        // Get auth options from server
        const optResp = await fetch('/api/auth/passkey/auth-options', { method: 'POST' });
        if (!optResp.ok) throw new Error('Failed to get auth options');
        const options = await optResp.json();

        // Convert base64url fields for WebAuthn API
        options.challenge = _b64urlToBuffer(options.challenge);
        if (options.allowCredentials) {
          options.allowCredentials = options.allowCredentials.map(c => ({
            ...c,
            id: _b64urlToBuffer(c.id),
          }));
        }

        // Prompt for passkey
        const credential = await navigator.credentials.get({ publicKey: options });

        // Send assertion to server
        const authResp = await fetch('/api/auth/passkey/authenticate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            credential: {
              id: credential.id,
              rawId: _bufferToB64url(credential.rawId),
              response: {
                authenticatorData: _bufferToB64url(credential.response.authenticatorData),
                clientDataJSON: _bufferToB64url(credential.response.clientDataJSON),
                signature: _bufferToB64url(credential.response.signature),
                userHandle: credential.response.userHandle ? _bufferToB64url(credential.response.userHandle) : null,
              },
              type: credential.type,
              authenticatorAttachment: credential.authenticatorAttachment,
            }
          }),
        });

        if (!authResp.ok) {
          const data = await authResp.json().catch(() => ({}));
          throw new Error(data.detail || 'Passkey authentication failed');
        }

        const data = await authResp.json();
        localStorage.setItem('token', data.token);
        window.location.href = '/';
      } catch (err) {
        if (err.name === 'NotAllowedError') {
          // User cancelled
        } else {
          errorEl.textContent = err.message;
          errorEl.style.display = 'block';
        }
        passkeyBtn.disabled = false;
        passkeyBtn.textContent = '\u{1F510} Sign in with Passkey';
      }
    });

    function _b64urlToBuffer(b64url) {
      const b64 = b64url.replace(/-/g, '+').replace(/_/g, '/');
      const pad = b64.length % 4 === 0 ? '' : '='.repeat(4 - (b64.length % 4));
      const binary = atob(b64 + pad);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes.buffer;
    }

    function _bufferToB64url(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
  </script>
</body>
</html>
